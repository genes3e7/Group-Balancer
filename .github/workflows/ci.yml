name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
      id: filter
      with:
        filters: |
          python:
            - '**.py'
            - 'uv.lock'
            - 'pyproject.toml'
            - '.github/workflows/ci.yml'

  test-matrix:
    needs: check-changes
    if: needs.check-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
    - name: Set up uv
      uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --all-extras --frozen --no-compile
    - name: Test with Pytest
      run: uv run --no-sync pytest -n auto tests/
    - name: Record Success
      if: success()
      run: echo "${{ matrix.python-version }}" > python_version_${{ matrix.python-version }}.txt
    - name: Upload Success Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: passed-version-${{ matrix.python-version }}
        path: python_version_${{ matrix.python-version }}.txt

  finalize-updates:
    needs: test-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      needs.test-matrix.result == 'success' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.head_ref || github.ref_name }}
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: passed-version-*
        merge-multiple: true
    - name: Determine Supported Range
      id: versions
      run: |
        cat artifacts/*.txt | sort -V > "$RUNNER_TEMP/sorted_versions.txt"
        echo "MIN_VER=$(head -n 1 "$RUNNER_TEMP/sorted_versions.txt")" >> $GITHUB_ENV
        echo "MAX_VER=$(tail -n 1 "$RUNNER_TEMP/sorted_versions.txt")" >> $GITHUB_ENV
    - name: Set up uv
      uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0
      with:
        enable-cache: true
    - name: Run Final CI Gate
      run: uv run --no-sync python tools/pre_ci.py "$MIN_VER" "$MAX_VER"
    - name: Commit and Push
      env:
        REF_TO_PUSH: ${{ github.head_ref || github.ref_name }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -u
        if ! git diff --staged --quiet; then
          git commit -m "chore: professional standards updates and CI maintenance"
          git push origin HEAD:"$REF_TO_PUSH"
        fi
