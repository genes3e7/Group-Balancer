name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
      id: filter
      with:
        filters: |
          python:
            - '**.py'
            - 'requirements.in'
            - 'requirements.txt'
            - 'pyproject.toml'
            - '.github/workflows/ci.yml'

  test-matrix:
    needs: check-changes
    if: needs.check-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15-dev"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        uv pip install -r requirements.in
        uv pip install pytest
    - name: Test with Pytest
      run: uv run pytest tests/
    - name: Record Success
      if: success()
      run: echo "${{ matrix.python-version }}" > python_version_${{ matrix.python-version }}.txt
    - name: Upload Success Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: passed-version-${{ matrix.python-version }}
        path: python_version_${{ matrix.python-version }}.txt

  finalize-updates:
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always() && needs.test-matrix.result != 'skipped'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: passed-version-*
        merge-multiple: true
    - name: Determine Supported Range
      id: versions
      run: |
        if [ -z "$(ls -A artifacts)" ]; then
           exit 1
        fi
        cat artifacts/*.txt | sort -V > sorted_versions.txt
        echo "MIN_VER=$(head -n 1 sorted_versions.txt)" >> $GITHUB_ENV
        echo "MAX_VER=$(tail -n 1 sorted_versions.txt)" >> $GITHUB_ENV
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Update README Tree & Versions
      run: |
        uv pip install pathspec
        uv run python tools/update_readme.py "${{ env.MIN_VER }}" "${{ env.MAX_VER }}"
    - name: Compile requirements.txt
      run: uv pip compile requirements.in --output-file requirements.txt
    - name: Ruff Format & Fix
      run: |
        uv pip install ruff
        uv run ruff check . --fix
        uv run ruff format .
    - name: Verify Builder
      run: |
        uv pip install pyinstaller -r requirements.txt
        uv run python build.py
    - name: Commit and Push changes
      env:
        REF_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if ! git diff --staged --quiet; then
          git commit -m "chore: professional standards refactor & uv migration"
          git push origin HEAD:"$REF_NAME"
        fi
