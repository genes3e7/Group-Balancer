# .coderabbit.yaml
reviews:
  # Enable for all target branches
  target_branches: 
    - "**" 
  # OR leave it empty to default to all
  # target_branches: []

  # Ensure auto-review is on
  auto_review:
    enabled: true
    # To ignore bot PRs (e.g., Dependabot), use this:
    ignore_bot_prs: true
