[project]
name = "group-balancer"
version = "6.1.0"
description = "Optimizes team allocations based on individual scores and constraints."
authors = [{ name = "Group Balancer Contributors" }]
requires-python = ">=3.10"
dependencies = [
    "streamlit>=1.30.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "openpyxl>=3.1.0",
    "ortools>=9.8.0",
    "pathspec>=0.11.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "build",
    "dist",
    "venv",
]
line-length = 88
indent-width = 4

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "D"]
ignore = ["D100", "D104"] # We will ensure these are present, but ignoring for now to see other issues
fixable = ["ALL"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
